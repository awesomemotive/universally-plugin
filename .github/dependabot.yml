version: 2
updates:
  # WordPress plugin's JS dependencies (panel React app, @wordpress/scripts toolchain).
  - package-ecosystem: "npm"
    directory: "/plugin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      wordpress-packages:
        patterns:
          - "@wordpress/*"

  # WordPress plugin's PHP dependencies (currently autoload-only; here for when we add real ones).
  - package-ecosystem: "composer"
    directory: "/plugin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # GitHub Actions used in workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

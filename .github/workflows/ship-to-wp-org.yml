name: Ship to wp.org
run-name: Ship ${{ inputs.version != '' && inputs.version || 'latest stable' }}

# Manual-only release. Provide `version` to bump source files, commit
# "Release X.Y.Z" on master, tag, and ship. Leave it empty to re-ship the
# latest existing stable tag without bumping anything.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version to release (e.g. 1.0.4 or 1.0.4-beta.1). Leave empty to re-ship the latest existing stable tag.'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SLUG: universally-language-translation-multilingual-tool

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so we can resolve "latest stable", create a
          # bump commit on master, and tag from CI.
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version, bump + tag when creating a new release
        id: parse
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ inputs.version }}"
          INPUT_VERSION="${INPUT_VERSION#v}"

          if [ -z "$INPUT_VERSION" ]; then
            # Empty input → re-ship the latest existing stable tag (no bump, no tag).
            TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v -- '-' | head -n1 || true)
            if [ -z "$TAG" ]; then
              echo "::error::No stable tags found. Provide 'version' to create the first one."
              exit 1
            fi
            VERSION="${TAG#v}"
            echo "Re-shipping latest stable tag: $TAG"
            git checkout "refs/tags/${TAG}"
          else
            VERSION="$INPUT_VERSION"
            if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
              echo "::error::Invalid version: '${VERSION}'. Expected semver (e.g. 1.0.4 or 1.0.4-beta.1)."
              exit 1
            fi
            TAG="v${VERSION}"
            IS_PRE=false
            [[ "$VERSION" == *-* ]] && IS_PRE=true

            if git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "Tag ${TAG} already exists — re-shipping it without bumping."
              git checkout "refs/tags/${TAG}"
            else
              echo "Creating new release ${TAG} from master."
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

              # Bump plugin/universally.php header + UNIVERSALLY_VERSION
              sed -i "s/^ \\* Version:.*/ * Version: ${VERSION}/" plugin/universally.php
              sed -i "s/^const UNIVERSALLY_VERSION = .*/const UNIVERSALLY_VERSION = '${VERSION}';/" plugin/universally.php

              # Bump plugin/package.json (node preserves JSON formatting)
              node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('plugin/package.json','utf8')); p.version='${VERSION}'; fs.writeFileSync('plugin/package.json', JSON.stringify(p, null, 2) + '\n');"

              # readme.txt Stable tag — stable releases only
              if [ "$IS_PRE" = "false" ]; then
                sed -i "s/^Stable tag:.*/Stable tag: ${VERSION}/" plugin/readme.txt
              fi

              git add plugin/universally.php plugin/package.json
              [ "$IS_PRE" = "false" ] && git add plugin/readme.txt
              git diff --cached --quiet || git commit -m "Release ${VERSION}"
              git push origin HEAD:master

              git tag -a "${TAG}" -m "Release ${VERSION}"
              git push origin "refs/tags/${TAG}"
            fi
          fi

          IS_PRE=false
          [[ "$VERSION" == *-* ]] && IS_PRE=true
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRE" >> "$GITHUB_OUTPUT"
          echo "Tag=$TAG Version=$VERSION Prerelease=$IS_PRE"

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: plugin/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: plugin/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('plugin/package-lock.json') }}

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-${{ hashFiles('plugin/composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Install phpcs + sniff packages
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-progress --no-interaction \
            squizlabs/php_codesniffer:^3 \
            phpcompatibility/phpcompatibility-wp:^2 \
            wp-coding-standards/wpcs:^3 \
            dealerdirect/phpcodesniffer-composer-installer:^1

      - name: phpcs (security + PHP 7.4 compat)
        run: phpcs

      - name: Build production zip
        run: bash scripts/build.sh "${{ steps.parse.outputs.version }}"

      - name: WordPress Plugin Check (hard gate)
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: build/staging/${{ env.SLUG }}
          # stable_tag_mismatch is only suppressed on prereleases — where Stable tag intentionally
          # stays at the last shipped stable while Version is bumped. Stable releases MUST pass
          # this check so a forgotten Stable-tag bump blocks the SVN deploy.
          ignore-codes: ${{ steps.parse.outputs.is_prerelease == 'true' && 'mismatched_plugin_name,stable_tag_mismatch,EnqueuedScriptsScope,NonBlockingScripts.NoStrategy' || 'mismatched_plugin_name,EnqueuedScriptsScope,NonBlockingScripts.NoStrategy' }}

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-staging
          path: |
            build/staging/${{ env.SLUG }}
            dist/${{ env.SLUG }}-${{ steps.parse.outputs.version }}.zip
          retention-days: 7

  deploy-svn:
    needs: build
    if: needs.build.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-staging

      - name: Deploy to wp.org SVN
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SLUG: universally-language-translation-multilingual-tool
          BUILD_DIR: build/staging/universally-language-translation-multilingual-tool
          ASSETS_DIR: assets
          VERSION: ${{ needs.build.outputs.version }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}

  gh-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-staging

      - name: Compose release body with Playground link
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${SLUG}-${VERSION}.zip"
          BLUEPRINT="{\"landingPage\":\"/wp-admin/plugins.php\",\"login\":true,\"steps\":[{\"step\":\"installPlugin\",\"pluginData\":{\"resource\":\"url\",\"url\":\"${ZIP_URL}\"}}]}"
          ENCODED=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))" "$BLUEPRINT")
          PLAYGROUND_URL="https://playground.wordpress.net/?php=8.0#${ENCODED}"
          echo "[Try in WordPress Playground](${PLAYGROUND_URL})" > release-body.md
          cat release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.build.outputs.version }}
          tag_name: v${{ needs.build.outputs.version }}
          # For tag-push runs the tag already exists; for workflow_dispatch the
          # action creates it pointing at the workflow's commit.
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.build.outputs.is_prerelease == 'true' }}
          body_path: release-body.md
          files: dist/${{ env.SLUG }}-${{ needs.build.outputs.version }}.zip

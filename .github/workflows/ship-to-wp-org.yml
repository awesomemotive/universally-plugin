name: Ship to wp.org
run-name: Ship ${{ inputs.tag != '' && inputs.tag || 'latest stable' }}

# Release is manual-only. Tag pushes do NOT auto-deploy — you ship by
# opening Actions → Ship to wp.org → Run workflow.
# Leave "tag" empty to ship the latest stable tag (vX.Y.Z with no prerelease
# suffix). Type a specific tag to ship something else (older release, beta, rc).
# Local `npm run release` creates the tag; it never triggers a deploy.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to ship (leave empty to ship the latest stable tag)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SLUG: universally-language-translation-multilingual-tool

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Fetch full history + tags so we can resolve "latest stable" locally.
          # We check out the tag explicitly in the next step.
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve tag and version
        id: parse
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            # Latest stable = highest vX.Y.Z tag with no prerelease suffix.
            TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v -- '-' | head -n1 || true)
            if [ -z "$TAG" ]; then
              echo "::error::No stable tags (vX.Y.Z) found in repo."
              exit 1
            fi
            echo "Auto-selected latest stable tag: $TAG"
          fi
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid tag format: '${TAG}'. Expected 'v<semver>' (e.g. v1.0.4 or v1.0.4-beta.1)."
            exit 1
          fi
          if ! git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag '${TAG}' not found. Push it from local (npm run release) first."
            exit 1
          fi
          # Switch working tree to the resolved tag for the rest of the build.
          git checkout "refs/tags/${TAG}"
          VERSION="${TAG#v}"
          IS_PRE=false
          if [[ "$VERSION" == *-* ]]; then
            IS_PRE=true
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRE" >> "$GITHUB_OUTPUT"
          echo "Tag=$TAG Version=$VERSION Prerelease=$IS_PRE"

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: plugin/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: plugin/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('plugin/package-lock.json') }}

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-${{ hashFiles('plugin/composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Install phpcs + sniff packages
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-progress --no-interaction \
            squizlabs/php_codesniffer:^3 \
            phpcompatibility/phpcompatibility-wp:^2 \
            wp-coding-standards/wpcs:^3 \
            dealerdirect/phpcodesniffer-composer-installer:^1

      - name: phpcs (security + PHP 7.4 compat)
        run: phpcs

      - name: Build production zip
        run: bash scripts/build.sh "${{ steps.parse.outputs.version }}"

      - name: WordPress Plugin Check (hard gate)
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: build/staging/${{ env.SLUG }}
          # stable_tag_mismatch is only suppressed on prereleases — where Stable tag intentionally
          # stays at the last shipped stable while Version is bumped. Stable releases MUST pass
          # this check so a forgotten Stable-tag bump blocks the SVN deploy.
          ignore-codes: ${{ steps.parse.outputs.is_prerelease == 'true' && 'mismatched_plugin_name,stable_tag_mismatch,EnqueuedScriptsScope,NonBlockingScripts.NoStrategy' || 'mismatched_plugin_name,EnqueuedScriptsScope,NonBlockingScripts.NoStrategy' }}

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-staging
          path: |
            build/staging/${{ env.SLUG }}
            dist/${{ env.SLUG }}-${{ steps.parse.outputs.version }}.zip
          retention-days: 7

  deploy-svn:
    needs: build
    if: needs.build.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-staging

      - name: Deploy to wp.org SVN
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SLUG: universally-language-translation-multilingual-tool
          BUILD_DIR: build/staging/universally-language-translation-multilingual-tool
          ASSETS_DIR: assets
          VERSION: ${{ needs.build.outputs.version }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}

  gh-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-staging

      - name: Compose release body with Playground link
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${SLUG}-${VERSION}.zip"
          BLUEPRINT="{\"landingPage\":\"/wp-admin/plugins.php\",\"login\":true,\"steps\":[{\"step\":\"installPlugin\",\"pluginData\":{\"resource\":\"url\",\"url\":\"${ZIP_URL}\"}}]}"
          ENCODED=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))" "$BLUEPRINT")
          PLAYGROUND_URL="https://playground.wordpress.net/?php=8.0#${ENCODED}"
          echo "[Try in WordPress Playground](${PLAYGROUND_URL})" > release-body.md
          cat release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.build.outputs.version }}
          tag_name: v${{ needs.build.outputs.version }}
          # For tag-push runs the tag already exists; for workflow_dispatch the
          # action creates it pointing at the workflow's commit.
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.build.outputs.is_prerelease == 'true' }}
          body_path: release-body.md
          files: dist/${{ env.SLUG }}-${{ needs.build.outputs.version }}.zip

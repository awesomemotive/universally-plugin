name: Validate PR

on:
  pull_request:

jobs:
  # Detect which kinds of files actually changed. Other jobs gate on these
  # outputs so a docs-only PR doesn't burn minutes running every check.
  # If any workflow file changes, all jobs run as a safety net.
  changes:
    runs-on: ubuntu-latest
    outputs:
      php: ${{ steps.filter.outputs.php }}
      js: ${{ steps.filter.outputs.js }}
      composer: ${{ steps.filter.outputs.composer }}
      build: ${{ steps.filter.outputs.build }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            php:
              - 'plugin/**/*.php'
              - 'phpcs.xml.dist'
            js:
              - 'plugin/panel/js/**'
              - 'plugin/tsconfig.json'
              - 'plugin/package.json'
              - 'plugin/package-lock.json'
            composer:
              - 'plugin/composer.json'
              - 'plugin/composer.lock'
            build:
              - 'plugin/**'
              - 'scripts/**'
            workflows:
              - '.github/workflows/**'

  phpcs:
    name: PHPCS (security + PHP 7.4 compat)
    needs: changes
    if: needs.changes.outputs.php == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # reviewdog needs this to post PR review comments
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Install phpcs + sniff packages
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-progress --no-interaction \
            squizlabs/php_codesniffer:^3 \
            phpcompatibility/phpcompatibility-wp:^2 \
            wp-coding-standards/wpcs:^3 \
            dealerdirect/phpcodesniffer-composer-installer:^1

      - uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run phpcs (phpcs.xml.dist)
        continue-on-error: true
        run: phpcs --report=checkstyle > phpcs-report.xml

      - name: Post findings via reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat phpcs-report.xml | reviewdog \
            -f=checkstyle \
            -name=phpcs \
            -reporter=github-pr-review \
            -filter-mode=nofilter \
            -level=warning \
            -fail-level=error

  build-and-preview:
    name: Build, check & Playground preview
    needs: changes
    if: needs.changes.outputs.build == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # sticky Playground comment
    env:
      SLUG: universally-language-translation-multilingual-tool
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: plugin/package-lock.json

      - name: Build production zip
        id: stage
        run: bash scripts/build.sh

      - uses: wordpress/plugin-check-action@v1
        with:
          build-dir: build/staging/${{ env.SLUG }}
          # Error-code-level suppression so we keep the rest of each parent check enabled
          # (license / requires / tested-up-to / etc. inside plugin_readme stay active).
          # - mismatched_plugin_name: intentional (long SEO name in readme vs short in header).
          # - stable_tag_mismatch: source enters this state during "prerelease in progress" windows
          #   (Version bumped to vX.Y.Z-beta.N, Stable tag stays at last shipped stable). The real
          #   gate is in ship-to-wp-org.yml, where this is enforced on stable-tag pushes.
          # - EnqueuedScriptsScope, NonBlockingScripts.NoStrategy: accepted perf warnings on the
          #   language switcher script.
          ignore-codes: 'mismatched_plugin_name,stable_tag_mismatch,EnqueuedScriptsScope,NonBlockingScripts.NoStrategy'

      - name: Upload built plugin as PR artifact
        if: always() && steps.stage.outcome == 'success' && github.event_name == 'pull_request'
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SLUG }}-pr-${{ github.event.pull_request.number }}
          # Uploading `build/staging` (not the inner slug dir) preserves the wrapping
          # ${SLUG}/ folder inside the artifact zip — which is what WP/Playground
          # expects when installing a plugin from a URL.
          path: build/staging
          retention-days: 14

      - name: Compose Playground links
        if: always() && steps.upload.outcome == 'success'
        id: playground
        run: |
          set -euo pipefail
          ZIP_URL="https://nightly.link/${{ github.repository }}/actions/artifacts/${{ steps.upload.outputs.artifact-id }}.zip"
          BLUEPRINT='{"landingPage":"/wp-admin/plugins.php","login":true,"steps":[{"step":"installPlugin","pluginData":{"resource":"url","url":"'"${ZIP_URL}"'"}}]}'
          ENCODED=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))" "$BLUEPRINT")
          link() { echo "[open](https://playground.wordpress.net/?php=$1&wp=$2#${ENCODED})"; }

          TABLE=$(cat <<EOF
          | WP \ PHP | 7.4 | 8.0 | 8.1 | 8.2 | 8.3 |
          |---|---|---|---|---|---|
          | 6.4 | $(link 7.4 6.4) | — | — | — | — |
          | latest | $(link 7.4 latest) | $(link 8.0 latest) | $(link 8.1 latest) | $(link 8.2 latest) | $(link 8.3 latest) |
          EOF
          )

          DELIM="EOF_$(date +%s)"
          {
            echo "zip_url=${ZIP_URL}"
            echo "table<<${DELIM}"
            echo "$TABLE"
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Sticky Playground comment
        if: always() && steps.playground.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-playground
          message: |
            🚀 **Test this PR in WordPress Playground**

            Each link auto-installs the plugin built from this branch into a fresh WP at the given version combo.

            ${{ steps.playground.outputs.table }}

            Direct zip download: ${{ steps.playground.outputs.zip_url }}

            Built from `${{ github.event.pull_request.head.sha }}`. Artifact expires in 14 days.

      # --- Headless WP smoke test -------------------------------------------
      # Boots the staged plugin under @wp-playground/cli (the official successor
      # to wp-now — same WASM/SQLite WordPress runtime, actively maintained).
      # Plugin auto-activates via tests/playground/blueprint.json. Playwright
      # then asserts: plugin activates without a fatal, each of the three
      # settings tabs hydrates with fields, the REST namespace is registered,
      # and the front-end home doesn't WSOD.
      - name: Install Playwright test deps
        if: github.event_name == 'pull_request' && steps.stage.outcome == 'success'
        working-directory: tests/playground
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Boot Playground CLI with staged plugin
        if: github.event_name == 'pull_request' && steps.stage.outcome == 'success'
        id: playground
        run: |
          set -euo pipefail
          PLUGIN_DIR="${{ github.workspace }}/build/staging/${SLUG}"
          mkdir -p tests/playground
          # --php=7.4 is required here even though the blueprint declares
          # preferredVersions: the @wp-playground/cli ignores that field and
          # only honors its CLI flag. The blueprint setting is kept for
          # portability (playground.wordpress.net URL loads do honor it).
          nohup npx --yes @wp-playground/cli@latest server \
            --mount="$PLUGIN_DIR:/wordpress/wp-content/plugins/${SLUG}" \
            --port=12345 \
            --php=7.4 \
            --blueprint=tests/playground/blueprint.json \
            > tests/playground/playground.log 2>&1 &
          echo $! > tests/playground/playground.pid
          # Probe via localhost (the CLI binds to dual-stack). -L follows
          # install-wizard redirects.
          for i in $(seq 1 240); do
            if curl -fsSL "http://localhost:12345/" -o /dev/null 2>/dev/null; then
              echo "Playground ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Playground never responded" >&2
          echo "--- listening sockets ---" >&2
          ss -ltn || netstat -tln || true
          echo "--- playground.log ---" >&2
          tail -n 200 tests/playground/playground.log >&2 || true
          exit 1

      - name: Run Playwright smoke
        if: steps.playground.outcome == 'success'
        id: smoke
        working-directory: tests/playground
        run: npx playwright test --reporter=list

      - name: Dump Playground log on failure
        if: failure() && steps.playground.outcome == 'success'
        run: |
          echo "=== playground.log (tail) ==="
          tail -n 200 tests/playground/playground.log || true
          echo "=== PHP fatals / parse errors in log ==="
          grep -E "PHP (Fatal|Parse) error|Uncaught" tests/playground/playground.log || echo "(none found)"

      - name: Stop Playground
        if: always() && steps.playground.outcome == 'success'
        run: |
          if [ -f tests/playground/playground.pid ]; then
            kill "$(cat tests/playground/playground.pid)" 2>/dev/null || true
          fi

  composer-audit:
    name: composer audit
    needs: changes
    if: needs.changes.outputs.composer == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: composer audit
        working-directory: plugin
        run: composer audit --no-dev --abandoned=report

  typescript:
    name: TypeScript type-check
    needs: changes
    if: needs.changes.outputs.js == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: plugin/package-lock.json

      - name: Type-check
        working-directory: plugin
        run: |
          npm ci
          npx tsc --noEmit

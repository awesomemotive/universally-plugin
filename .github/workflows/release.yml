name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Prerelease semver (e.g. 1.0.3-beta.1). Must contain a hyphen — manual dispatch is for prereleases only; stable cuts go through `npm run release`.'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SLUG: universally-language-translation-multilingual-tool

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: parse
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            # Strip a leading 'v' if the dispatcher included it.
            VERSION="${VERSION#v}"
            # Refuse stable versions on dispatch — those must come from `npm run release`
            # so the version-bump commit lands in source history.
            if [[ "$VERSION" != *-* ]]; then
              echo "::error::Manual dispatch is for prereleases only. Got '${VERSION}' (no '-' suffix). Cut stable releases with \`npm run release\`."
              exit 1
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"        # v1.2.3 or v1.2.3-beta.1
            VERSION="${TAG#v}"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Invalid semver: '${VERSION}'"
            exit 1
          fi
          IS_PRE=false
          if [[ "$VERSION" == *-* ]]; then
            IS_PRE=true
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRE" >> "$GITHUB_OUTPUT"
          echo "Event=${{ github.event_name }} Version=$VERSION Prerelease=$IS_PRE"

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: plugin/package-lock.json

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Install phpcs + sniff packages
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-progress --no-interaction \
            squizlabs/php_codesniffer:^3 \
            phpcompatibility/phpcompatibility-wp:^2 \
            wp-coding-standards/wpcs:^3 \
            dealerdirect/phpcodesniffer-composer-installer:^1

      - name: phpcs (security + PHP 7.4 compat)
        run: phpcs

      - name: Build panel JS
        working-directory: plugin
        run: |
          npm ci
          npx wp-scripts build --webpack-src-dir=panel/js --output-path=panel/build

      - name: Generate POT
        working-directory: plugin
        run: npm run makepot

      - name: Stage production tree
        env:
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          set -euo pipefail
          STAGE="build/staging/${SLUG}"
          rm -rf build && mkdir -p "$STAGE"

          cp plugin/universally.php "$STAGE/"
          cp plugin/uninstall.php   "$STAGE/"
          cp plugin/config.php      "$STAGE/"
          cp plugin/readme.txt      "$STAGE/"
          cp -r plugin/app          "$STAGE/app"
          cp -r plugin/includes     "$STAGE/includes"
          cp -r plugin/assets       "$STAGE/assets"
          cp -r plugin/languages    "$STAGE/languages"

          mkdir -p "$STAGE/panel/build"
          cp plugin/panel/build/index.js         "$STAGE/panel/build/"
          cp plugin/panel/build/index.asset.php  "$STAGE/panel/build/"
          for f in plugin/panel/build/style-index*.css; do
            [ -f "$f" ] && cp "$f" "$STAGE/panel/build/"
          done
          [ -d plugin/panel/build/blocks ] && cp -r plugin/panel/build/blocks "$STAGE/panel/build/blocks"
          cp -r plugin/panel/src "$STAGE/panel/src"
          cp plugin/composer.json "$STAGE/"

          # Version-stamp the staged files (CI never modifies source).
          sed -i "s/\* Version:.*/* Version: ${VERSION}/" "$STAGE/universally.php"
          sed -i "s/const UNIVERSALLY_VERSION = .*/const UNIVERSALLY_VERSION = '${VERSION}';/" "$STAGE/universally.php"
          # Only patch Stable tag for stable releases (no '-' in VERSION).
          if [[ "${VERSION}" != *-* ]]; then
            sed -i "s/^Stable tag:.*/Stable tag: ${VERSION}/" "$STAGE/readme.txt"
          fi

          (cd "$STAGE" && composer install --no-dev --optimize-autoloader --no-interaction --quiet)
          rm -f "$STAGE/composer.lock"

          find "$STAGE" \( -name ".DS_Store" -o -name ".gitkeep" -o -name "Thumbs.db" -o -name "*.map" \) -delete || true

          mkdir -p dist
          (cd build/staging && zip -r "../../dist/${SLUG}-${VERSION}.zip" "${SLUG}" -q)
          ls -lh "dist/${SLUG}-${VERSION}.zip"

      - name: WordPress Plugin Check (hard gate)
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: build/staging/${{ env.SLUG }}
          # See ci.yml for per-code rationale.
          ignore-codes: 'mismatched_plugin_name,stable_tag_mismatch,EnqueuedScriptsScope,NonBlockingScripts.NoStrategy'

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-staging
          path: |
            build/staging/${{ env.SLUG }}
            dist/${{ env.SLUG }}-${{ steps.parse.outputs.version }}.zip
          retention-days: 7

  deploy-svn:
    needs: build
    if: needs.build.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-staging

      - name: Deploy to wp.org SVN
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SLUG: universally-language-translation-multilingual-tool
          BUILD_DIR: build/staging/universally-language-translation-multilingual-tool
          ASSETS_DIR: assets
          VERSION: ${{ needs.build.outputs.version }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}

  gh-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-staging

      - name: Compose release body with Playground link
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          ZIP_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${SLUG}-${VERSION}.zip"
          BLUEPRINT="{\"landingPage\":\"/wp-admin/plugins.php\",\"login\":true,\"steps\":[{\"step\":\"installPlugin\",\"pluginData\":{\"resource\":\"url\",\"url\":\"${ZIP_URL}\"}}]}"
          ENCODED=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))" "$BLUEPRINT")
          PLAYGROUND_URL="https://playground.wordpress.net/?php=8.0#${ENCODED}"
          echo "[Try in WordPress Playground](${PLAYGROUND_URL})" > release-body.md
          cat release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.build.outputs.version }}
          tag_name: v${{ needs.build.outputs.version }}
          # For tag-push runs the tag already exists; for workflow_dispatch the
          # action creates it pointing at the workflow's commit.
          target_commitish: ${{ github.sha }}
          prerelease: ${{ needs.build.outputs.is_prerelease == 'true' }}
          body_path: release-body.md
          files: dist/${{ env.SLUG }}-${{ needs.build.outputs.version }}.zip

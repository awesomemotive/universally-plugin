name: CI

on:
  pull_request:

jobs:
  php-compat:
    name: PHP 7.4 compatibility
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # reviewdog needs this to post PR review comments
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Install PHPCompatibility + phpcs
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-progress --no-interaction \
            squizlabs/php_codesniffer:^3 \
            phpcompatibility/phpcompatibility-wp:^2 \
            dealerdirect/phpcodesniffer-composer-installer:^1

      - name: Scan with reviewdog
        uses: reviewdog/action-phpcs@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: nofilter
          level: error
          phpcs_args: >-
            --standard=PHPCompatibilityWP
            --runtime-set testVersion 7.4-
            --extensions=php
            plugin/app
            plugin/includes
            plugin/panel/src
            plugin/universally.php
            plugin/uninstall.php
            plugin/config.php
